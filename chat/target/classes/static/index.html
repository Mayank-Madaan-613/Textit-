<!DOCTYPE html>
<html>
<head>
    <title>TextIt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        
        body {
            background-image:url(b.jpg); 
            background-size:cover;
            background-position:fixed;
            padding: 3rem;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            margin: 0;
        }

        
        .chat-container {
            position:center;
            max-height:100vh; 
            backdrop-filter:blur(8px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 3rem;
            overflow: hidden;
        }

        .chat-header {
            background-color: #2563eb; 
            padding: 1rem;
            color: white;
            font-weight: bold;
        }

        
        #messages {
            height: 26rem; 
            overflow-y:auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem; 
            font-size: 0.875rem;
        }

        
        .message-bubble {
            background-color: #e4eabc; 
            padding: 0.5rem;
            border-radius: 0.25rem;
        }

        
        .chat-footer {
            padding: 0.1rem 2rem;
            padding-bottom:2rem;
            display: flex;
            flex-direction: row;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            border-top:0px;
            border-left: 0px;
            border-right:0px;
            border-bottom: solid 2px black ;
            padding: 0.5rem;
            outline: none;
            background-color:rgba(0, 0, 0, 0);
            transition:border-color 0.2s;
        }

        .chat-input:focus { 
            border-color:#81bbd4;
        }

        
        .send-button {
            background-color:rgb(165, 229, 245);
            color: black;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            border: none;
            cursor: pointer;
            transition-property: background-color;
            transition-duration:0.2s;
        }

        .send-button:hover {
            background-color:#81bbd4;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        
        <div id="messages"></div>
        
        <div class="chat-footer">
            <input id="msg" type="text" class="chat-input" placeholder="Enter you message.....">
            <button onclick="send()" class="send-button">Send</button>
        </div>
    </div>

    <script>
        const inp=document.getElementById("msg");
        inp.addEventListener("keydown",(event)=>{
            if(event.key==="Enter"){
                event.preventDefault();
                send();
            }
        })
        var stompClient = null;

        function connect() {
            var socket = new SockJS('/ws-bridge');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/messages', function (msg) {
                    var div = document.createElement('div');
                    div.className = "message-bubble";
                    div.innerText = msg.body;
                    document.getElementById('messages').appendChild(div);
                    var msgDiv = document.getElementById('messages');
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                });
            });
        }

        function send() {
            var val = document.getElementById('msg').value;
            if (val.trim() !== "") {
                stompClient.send("/app/chat.send", {}, val);
                document.getElementById('msg').value = '';
            }
        }

        connect();
    </script>
</body>
</html>
